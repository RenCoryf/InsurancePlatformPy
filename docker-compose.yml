networks:
    net:
        driver: bridge

services:
    app:
        build: .
        container_name: app
        restart: unless-stopped
        networks:
            - net
        ports:
            # Swagger UI: http://<IP-сервера>/docs
            - "80:8000"
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
            minio:
                condition: service_healthy
            alembic:
                condition: service_completed_successfully
        healthcheck:
            test: ["CMD", "curl", "-fsS", "http://localhost:8000/openapi.json"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 15s
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "5"

    # Одноразовый прогон миграций перед стартом app.
    # alembic/env.py берёт URL БД из app.core.config (переменные DB_*),
    # поэтому ему нужен тот же .env, что и приложению.
    alembic:
        build: .
        container_name: alembic
        restart: "no"
        networks:
            - net
        command: uv run --no-sync alembic upgrade head
        env_file:
            - .env
        depends_on:
            database:
                condition: service_healthy

    database:
        image: postgres:18
        container_name: database
        restart: unless-stopped
        networks:
            - net
        environment:
            # Контейнер postgres использует те же DB_*, что и приложение
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            # Наружу не публикуем — только localhost сервера (для psql/бэкапов)
            - "127.0.0.1:5432:5432"
        volumes:
            # postgres:18 changed convention — mount the parent dir, not /data
            - "postgres_data:/var/lib/postgresql"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER} -d ${DB_NAME}",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "5"

    minio:
        image: minio/minio:latest
        container_name: minio
        restart: unless-stopped
        networks:
            - net
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
        command: server /data --console-address ":9001"
        ports:
            # 9000 публикуется наружу — presigned-ссылки на файлы ведут на этот порт
            - "9000:9000"
            # Консоль администратора — только localhost сервера
            - "127.0.0.1:9001:9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:8
        container_name: redis
        restart: unless-stopped
        networks:
            - net
        env_file:
            - .env
        command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
        ports:
            # Наружу не публикуем — только localhost сервера
            - "127.0.0.1:6379:6379"
        healthcheck:
            # $$ — чтобы пароль подставился внутри контейнера, а не при парсинге compose
            test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "5"
        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:
    minio_data:
