networks:
    net:
        driver: bridge

services:
    alembic:
        container_name: alembic
        networks:
            - net
        build: .
        command: uv run alembic upgrade head
        depends_on:
            database:
                condition: service_healthy
        environment:
            DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

    app:
        networks:
            - net
        build: .
        container_name: app
        restart: unless-stopped
        ports:
            - "8000:8000"
        depends_on:
            database:
                condition: service_healthy
        env_file:
            - .env

    database:
        networks:
            - net
        image: postgres:18
        container_name: database
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - "5432:5432"
        volumes:
            - "postgres_data:/var/lib/postgresql/data"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "5"
    redis:
        networks:
            - net
        image: redis:8
        env_file:
            - .env
        container_name: redis
        command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "5"
        restart: unless-stopped
        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:
